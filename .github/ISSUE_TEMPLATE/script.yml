name: 🔧 Script Bug Report
description: Report a bug in the build script. For issues with patched applications, use the App Bug Report template!
title: '[Script] '
labels: ['script-bug']
body:
  - type: markdown
    attributes:
      value: |
        ### Rules:

        - Speak English only.
        - This template is for bugs in the **build script** (e.g. crashes, download failures, patching errors).
        - For bugs in **patched applications**, use the [Build Result Bug Report](https://github.com/krvstek/uni-apks/issues/new?template=build.yml) template instead.
        - Do not submit a duplicate bug report.
        - If you have a **Question** or a **Suggestion**, please go to [Discussions](https://github.com/krvstek/uni-apks/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      placeholder: "Describe the issue..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the full terminal output. Sanitize any secrets before submitting.
      render: shell
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. Python 3.13.1, Arch Linux / Termux, Java 25 / Java 21"
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: |
        By submitting this issue, you confirm that you have performed the following steps.
        If any of the boxes below are left unchecked, or if your confirmation is found to be false, your issue will be **automatically closed and rejected** without further notice.
      options:
        - label: I have searched both [Issues](https://github.com/krvstek/uni-apks/issues) and [Discussions](https://github.com/krvstek/uni-apks/discussions) and did not find a similar report.
          required: true
        - label: I confirm this is a bug in the build script, and NOT a bug in the patched application or patches source.
          required: true
        - label: I have verified that my `config.toml` is valid.
          required: true
        - label: I understand that feature requests, "how-to" questions, and general help belong in [Discussions](https://github.com/krvstek/uni-apks/discussions).
          required: true
