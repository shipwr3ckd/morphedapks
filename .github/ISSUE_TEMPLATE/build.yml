name: 🏗️ Build Result Bug Report
description: Report an issue with a built APK - e.g. wrong version selected, APK fails to install, signature mismatch. For script/build process issues, use the Script Bug Report template!
title: '[Build] '
labels: ['build-bug']
body:
  - type: markdown
    attributes:
      value: |
        ### Rules:

        - Speak English only.
        - This template is for issues with **built APKs** (e.g. wrong version selected, APK fails to install, signature mismatch).
        - For bugs in the **build script itself**, use the [Script Bug Report](https://github.com/krvstek/uni-apks/issues/new?template=script.yml) template instead.
        - Do not submit a duplicate bug report.
        - If you have a **Question** or a **Suggestion**, please go to [Discussions](https://github.com/krvstek/uni-apks/discussions) instead.

  - type: input
    id: app_version
    attributes:
      label: App Name & Version
      placeholder: "e.g. Reddit v2077.12.05"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      placeholder: "Describe the issue..."
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: |
        By submitting this issue, you confirm that you have performed the following steps.
        If any of the boxes below are left unchecked, or if your confirmation is found to be false, your issue will be **automatically closed and rejected** without further notice.
      options:
        - label: I have searched both [Issues](https://github.com/krvstek/uni-apks/issues) and [Discussions](https://github.com/krvstek/uni-apks/discussions) and did not find a similar report.
          required: true
        - label: I confirm this is an issue with the built APK (e.g. install failure, wrong version, signature mismatch), and NOT a bug within the app features themselves.
          required: true
        - label: I understand that feature requests, "how-to" questions, and general help belong in [Discussions](https://github.com/krvstek/uni-apks/discussions).
          required: true