<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builder for Morphe</title>
    <meta name="description" content="📦 Pre-built APKs from various patch sources." />
    <link rel="icon" type="image/svg+xml" href="https://github.githubassets.com/favicons/favicon.svg" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css"
    />
    <style>
      body {
        margin: 0;
        background-color: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0d1117;
        }
      }
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
      }
      @media (max-width: 767px) {
        .markdown-body {
          padding: 15px;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id/lib/index.umd.js"></script>
  </head>
  <body>
    <div id="content" class="markdown-body">Loading content...</div>

    <script>
      marked.use(markedGfmHeadingId.gfmHeadingId());

      marked.setOptions({
        gfm: true,
      });

      fetch("README.md")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Failed to load README.md");
          }
          return response.text();
        })
        .then((markdownText) => {
          let processedText = markdownText.replace(/^> \[!NOTE\][ \t]*\r?\n((?:>.*(?:\r?\n|$))+)/gm, (match, p1) => {
            let cleanText = p1.replace(/^>\s?/gm, "");
            let htmlContent = marked.parse(cleanText);
            return `<div class="markdown-alert markdown-alert-note">\n<p class="markdown-alert-title"><svg class="octicon octicon-info mr-2" viewBox="0 0 16 16" version="1.1" width="16" height="16" aria-hidden="true"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>Note</p>\n${htmlContent}</div>\n`;
          });

          const html = marked.parse(processedText);
          document.getElementById("content").innerHTML = html;
        })
        .catch((error) => {
          document.getElementById("content").innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
        });
    </script>
  </body>
</html>
